<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="weather-card text-center p-4">

        <h1 class="mb-4">🌦️ Weather Dashboard</h1>
        <h4>Prajakta Gavhane</h4>
        <div class="input-group mb-4">
            <input type="text" id="cityInput" class="form-control" placeholder="Enter city name">
            <button class="btn btn-primary" onclick="getWeather()">Search</button>
        </div>

        <div id="loading" class="d-none">
            <div class="spinner-border text-light" role="status"></div>
            <p class="mt-2">Loading...</p>
        </div>

        <div id="weatherResult" class="d-none">

            <h2 id="cityName"></h2>

            <img id="weatherIcon" src="" alt="Weather Icon">

            <h1 id="temperature"></h1>

            <h4 id="description"></h4>

            <div class="row mt-4">
                <div class="col-md-6 mb-3">
                    <div class="info-box">
                        <h5>Humidity</h5>
                        <p id="humidity"></p>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <div class="info-box">
                        <h5>Wind Speed</h5>
                        <p id="wind"></p>
                    </div>
                </div>
            </div>

        </div>

        <div id="errorMessage" class="text-danger mt-3"></div>

    </div>

</div>
<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
